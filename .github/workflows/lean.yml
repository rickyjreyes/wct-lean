name: Lean formal reproducibility

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install elan and the repository-pinned Lean toolchain
        shell: bash
        run: |
          curl --proto '=https' --tlsv1.2 -sSf \
            https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
          "$HOME/.elan/bin/lean" --version
          "$HOME/.elan/bin/lake" --version
      - name: Fetch locked dependencies and Mathlib cache
        run: |
          lake update
          lake exe cache get
      - name: Audit source closure and emit SHA-256 manifest
        run: python scripts/audit_formal_sources.py
      - name: Build all maintained Lean targets
        shell: bash
        run: |
          set -o pipefail
          lake build 2>&1 | tee lean-build.log
      - name: Confirm the locked dependency graph is unchanged
        run: git diff --exit-code -- lake-manifest.json lean-toolchain lakefile.lean
      - name: Upload Lean build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lean-build-log-${{ github.sha }}
          if-no-files-found: error
          path: lean-build.log
      - name: Upload formal-source manifest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: formal-source-hashes-${{ github.sha }}
          if-no-files-found: error
          path: formal-source-hashes.json
