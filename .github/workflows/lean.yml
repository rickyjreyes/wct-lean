name: Lean

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Lean and Mathlib
        uses: leanprover/lean-action@v1
        continue-on-error: true
      - name: Run lake build with captured diagnostics
        run: |
          set +e
          lake build > lean-build.log 2>&1
          code=$?
          cat lean-build.log
          exit $code
      - name: Upload Lean diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lean-build-log
          path: lean-build.log
